<!DOCTYPE html>
<html>
<head>
    <title>Signup Page</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="container">
        
        <div class="img">
            <img src="School image.png" alt="School image">
        </div>

        <div class="form">
            <h1 style="text-align: center;">Create an Account</h1>
            <form action="/signup" method="post">
                <input type="text" name="student name" placeholder="Name" class="username"><br>
                <input type="email" name="email" placeholder="Email" class="email"><br>
                <input type="password" name="password" placeholder="Password" class="password"><br>

                <input type="checkbox" name="terms" id="terms">
                <label for="terms">Accept terms and conditions</label><br>

                <input type="submit" value="Signup" class="button">
            </form>
        </div>

    </div>
</body>
</html>
